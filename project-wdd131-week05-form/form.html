<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <title>Product Review Form</title>
    <meta name="author" content="Wilford Luna">
    <meta name="description" content="In this page we will use a form to give comments and feedback about a product.">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form action="review.html" method="get">
            <label>Required Fields (*)</label>
            <label>Product Name*</label>
            <label for="product"></label>
            <select id="product" required="">
                <option value="" disabled selected>Select a Product ...</option>
            </select>
            <label>Overall Rating*</label>
            <label for="stars" class="stars"><input type="radio" id="fivestar" name="stars" value="5" required></label>
            <label for="stars" class="stars"><input type="radio" id="fourstar" name="stars" value="4" required></label>
            <label for="stars" class="stars"><input type="radio" id="threestar" name="stars" value="3" required></label>
            <label for="stars" class="stars"><input type="radio" id="twostar" name="stars" value="2" required></label>
            <label for="stars" class="stars"><input type="radio" id="onestar" name="stars" value="1" required></label>
            <label for="completeDate">Date of Installation* <input type="date" name="completeDate" id="completeDate"
                    required></label>
            <label>Which features did you find useful in the product?</label>
            <label>(Check all that apply)</label>
            <label for="features"><input type="checkbox" name="features" id="feature_durability" value="durability">
                Durability</label>
            <label for="features"><input type="checkbox" name="features" id="feature_ease" value="ease of use"> Ease of
                Use</label>
            <label for="features"><input type="checkbox" name="features" id="feature_performance" value="performance">
                Performance</label>
            <label for="features"><input type="checkbox" name="features" id="feature_design" value="design">
                Design</label>
            <label for="comments">Written Review (Optional) <textarea name="comments" id="comments" rows="4"
                    cols="50"></textarea></label>
            <label for="name">Your name (Optional) <input type="text" name="name" id="name"></label>
            <input type="submit" value="Send my Product Review">
        </form>

    </main>
    <footer>
        <p>® <span id="currentyear"></span> - Wilford Luna Escobar - Peru</p>
        <p>Last Modification: <span id="lastModified"></span></p>
    </footer>
</body>

</html>
